{% extends 'base.html' %}
{% block body %}
<div class="min-h-[70vh] flex flex-col items-center justify-center text-center p-6">
    <div class="relative mb-12">
        <div class="absolute inset-0 bg-red-500 blur-[100px] opacity-20"></div>
        <div class="luxury-card w-64 h-64 rounded-[3rem] flex items-center justify-center border-2 border-red-200 shadow-2xl relative z-10 bg-red-50/30">
            <svg class="text-red-600 drop-shadow-2xl" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        </div>
    </div>

    <h2 class="text-4xl md:text-5xl font-black text-slate-800 mb-6 tracking-tight uppercase">System Exception</h2>
    <p class="text-slate-500 text-lg max-w-lg mx-auto mb-10 leading-relaxed font-medium">
        The AtenLana kernel has encountered an unexpected recursive loop. Our sentinels have been notified and are currently stabilizing the lattice.
    </p>

    <div class="flex flex-wrap justify-center gap-4">
        <a href="/" class="bg-slate-900 text-white px-10 py-4 rounded-2xl text-sm font-black uppercase tracking-widest hover:scale-105 transition-all shadow-2xl">
            Restart Kernel
        </a>
        <a href="/meet-the-team" class="px-10 py-4 rounded-2xl text-sm font-black uppercase tracking-widest text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all">
            Contact Engineering
        </a>
    </div>
</div>
{% endblock %}
