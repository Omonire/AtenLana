{% extends 'base.html' %}
{% block body %}
<style>
    .inbox-container {
        max-width: 900px;
        margin: 0 auto;
        padding-bottom: 4rem;
    }

    .announcement-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 2rem;
        margin-bottom: 1.5rem;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        box-shadow: var(--shadow-sm);
    }

    .announcement-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-md);
        border-color: var(--primary-light);
    }

    .priority-indicator {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 6px;
    }

    .priority-normal { background: var(--primary); }
    .priority-important { background: #fbbf24; }
    .priority-urgent { background: #ef4444; }

    .sender-avatar {
        width: 48px;
        height: 48px;
        background: #f5f3ff;
        color: var(--primary);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 1.2rem;
    }

    .meta-tag {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 4px 10px;
        border-radius: 6px;
        background: #f8fafc;
        color: var(--text-muted);
    }

    .message-body {
        font-size: 1rem;
        line-height: 1.6;
        color: var(--text);
        margin-top: 1rem;
        white-space: pre-wrap;
    }
</style>

<div class="inbox-container">
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem;">
        <div>
            <h1 class="text-3xl font-black text-slate-900 mb-1">Broadcast Inbox</h1>
            <p class="text-slate-500 font-medium">Real-time announcements and alerts from your lecturers.</p>
        </div>
        <button onclick="loadAnnouncements()" class="p-3 bg-slate-50 rounded-xl hover:bg-slate-100 transition-all border border-slate-200">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        </button>
    </div>

    <div id="announcement-list" class="space-y-4">
        <!-- JS Populated -->
        <div class="text-center py-20">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-secondary border-t-transparent rounded-full mb-4"></div>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">Synchronizing messages...</p>
        </div>
    </div>
</div>

<script>
    async function loadAnnouncements() {
        const list = document.getElementById('announcement-list');
        try {
            const resp = await fetch('/api/announcements/my');
            const data = await resp.json();

            if (data.length === 0) {
                list.innerHTML = `
                    <div class="bg-slate-50 rounded-[2.5rem] border-2 border-dashed border-slate-200 py-32 text-center">
                        <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl border border-slate-100">
                            <svg class="text-slate-300" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        </div>
                        <h3 class="text-xl font-bold text-slate-400">No announcements found.</h3>
                        <p class="text-slate-300 text-sm">You're all caught up with your academic broadcasts.</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = '';
            data.forEach(n => {
                const card = document.createElement('div');
                card.className = 'announcement-card';

                const priorityClass = `priority-${n.priority || 'normal'}`;

                card.innerHTML = `
                    <div class="priority-indicator ${priorityClass}"></div>
                    <div class="flex items-start gap-5">
                        <div class="sender-avatar">
                            ${n.first_name[0]}${n.last_name[0]}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between mb-1">
                                <h4 class="font-bold text-slate-900 truncate">${n.first_name} ${n.last_name}</h4>
                                <span class="text-[10px] text-slate-400 font-bold">${n.created_at}</span>
                            </div>
                            <div class="flex gap-2 items-center">
                                <span class="meta-tag">${n.sender_role}</span>
                                <span class="text-[10px] font-black uppercase tracking-widest ${n.priority === 'urgent' ? 'text-red-500' : 'text-secondary'}">${n.priority}</span>
                            </div>
                            <div class="message-body">${n.message}</div>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        } catch (e) {
            list.innerHTML = '<div class="text-center text-red-500 font-bold">Failed to load messages.</div>';
        }
    }

    document.addEventListener('DOMContentLoaded', loadAnnouncements);
</script>
{% endblock %}
