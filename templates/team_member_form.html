{% extends 'base.html' %}
{% block body %}
<div class="luxury-card p-6 md:p-12 rounded-[2rem] md:rounded-[3rem] relative overflow-hidden max-w-2xl mx-auto">
    <a href="{{ url_for('superadmin_team') }}" class="inline-flex items-center gap-2 text-sm font-bold text-secondary mb-8 hover:underline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg>
        Back to Team
    </a>

    <h2 class="text-3xl md:text-4xl font-black text-slate-900 mb-10">
        {{ 'Edit Team Member' if member else 'Add Team Member' }}
    </h2>

    <form action="{{ url_for('admin_manage_team') }}" method="POST" enctype="multipart/form-data" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="action" value="{{ 'edit_member' if member else 'add_member' }}">
        {% if member %}
        <input type="hidden" name="member_id" value="{{ member.id }}">
        {% endif %}

        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Full Name</label>
                <input type="text" name="name" value="{{ member.name if member else '' }}" class="w-full px-6 py-4 rounded-xl border border-slate-300 bg-[#ffffff] text-[#0f172a] outline-none font-bold text-sm" required>
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Role</label>
                <select name="role_id" class="w-full px-6 py-4 rounded-xl border border-slate-300 bg-[#ffffff] text-[#0f172a] outline-none font-bold text-sm" required>
                    {% for role in roles %}
                    <option value="{{ role.id }}" {{ 'selected' if member and member.role_id == role.id }}>{{ role.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Biography</label>
            <textarea name="bio" rows="4" class="w-full px-6 py-4 rounded-xl border border-slate-300 bg-[#ffffff] text-[#0f172a] outline-none font-bold text-sm">{{ member.bio if member else '' }}</textarea>
        </div>

        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Email</label>
                <input type="email" name="email" value="{{ member.email if member else '' }}" class="w-full px-6 py-4 rounded-xl border border-slate-300 bg-[#ffffff] text-[#0f172a] outline-none font-bold text-sm">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">WhatsApp</label>
                <input type="text" name="whatsapp" value="{{ member.whatsapp if member else '' }}" class="w-full px-6 py-4 rounded-xl border border-slate-300 bg-[#ffffff] text-[#0f172a] outline-none font-bold text-sm">
            </div>
        </div>

        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Profile Image</label>
            <input type="file" name="image" class="w-full px-6 py-4 rounded-xl border border-slate-300 bg-[#ffffff] text-[#0f172a] outline-none font-bold text-sm">
        </div>

        <div class="flex items-center gap-3">
            <input type="checkbox" name="visible" {{ 'checked' if not member or member.visible else '' }} class="w-5 h-5 accent-secondary">
            <label class="text-sm font-bold text-slate-600">Publicly visible</label>
        </div>

        <div class="flex gap-4 pt-4">
            <a href="{{ url_for('superadmin_team') }}" class="flex-1 px-8 py-4 rounded-xl border border-slate-600 text-slate-400 font-bold text-sm text-center hover:bg-slate-800/50 transition-all">Cancel</a>
            <button type="submit" class="flex-1 btn-primary px-8 py-4 rounded-xl font-bold text-sm">{{ 'Update Member' if member else 'Add Member' }}</button>
        </div>
    </form>
</div>
{% endblock %}
