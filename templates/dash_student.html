{% extends 'base.html' %}

{% block body %}
<style>
    :root {
        --purple: #5b2e8c;
        --purple-light: #7b4fb3;
        --bg: #f6f3ff;
        --white: #ffffff;
        --text-dark: #2b0031;
        --text-muted: #6b7280;
        --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .dashboard-container {
        display: flex;
        justify-content: center;
        padding-top: 50px;
        background-color: var(--bg);
        min-height: 80vh;
    }

    .dashboard-card {
        background: var(--white);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 32px;
        max-width: 450px;
        width: 100%;
        text-align: center;
        border-bottom: 4px solid var(--purple);
        transition: transform 0.2s ease;
    }

    .dashboard-card:hover {
        transform: translateY(-5px);
    }

    .dashboard-card h3 {
        color: var(--purple);
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
    }

    .dashboard-card .muted {
        color: var(--text-muted);
        font-size: 0.95rem;
        line-height: 1.5;
        margin-bottom: 24px;
    }

    .btn-dashboard {
        display: inline-block;
        background-color: var(--purple);
        color: white !important;
        text-decoration: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(91, 46, 140, 0.2);
    }

    .btn-dashboard:hover {
        background-color: var(--purple-light);
        box-shadow: 0 6px 15px rgba(91, 46, 140, 0.3);
        transform: scale(1.02);
    }
</style>

<div class="dashboard-container">
    <div class="dashboard-card">
        <h3>Student Dashboard</h3>
        <p class="muted">Track attendance, join live sessions, and view your academic eligibility in one place.</p>

        {% if g.user and g.user['role']=='student' %}
            <a class="btn-dashboard" href="{{ url_for('student_dashboard') }}">
                Open My Dashboard
            </a>
        {% else %}
            <a class="btn-dashboard" href="{{ url_for('login', role='student') }}">
                Sign in as Student
            </a>
        {% endif %}
    </div>
</div>
{% endblock %}
