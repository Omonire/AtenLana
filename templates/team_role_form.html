{% extends 'base.html' %}
{% block body %}
<div class="luxury-card p-6 md:p-12 rounded-[2rem] md:rounded-[3rem] relative overflow-hidden max-w-lg mx-auto">
    <a href="{{ url_for('superadmin_team') }}" class="inline-flex items-center gap-2 text-sm font-bold text-secondary mb-8 hover:underline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg>
        Back to Team
    </a>

    <h2 class="text-3xl md:text-4xl font-black text-slate-900 mb-10">
        {{ 'Edit Role' if edit_role else 'Add Role' }}
    </h2>

    <form action="{{ url_for('admin_manage_team') }}" method="POST" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="action" value="{{ 'edit_role' if edit_role else 'add_role' }}">
        {% if edit_role %}
        <input type="hidden" name="role_id" value="{{ edit_role.id }}">
        {% endif %}

        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Role Name</label>
            <input type="text" name="role_name" value="{{ edit_role.name if edit_role else '' }}" class="w-full px-6 py-4 rounded-xl border border-slate-200 bg-[#ffffff] text-[#0b0c0f] outline-none font-bold text-sm" required>
        </div>

        <div class="flex gap-4 pt-4">
            <a href="{{ url_for('superadmin_team') }}" class="flex-1 px-8 py-4 rounded-xl border border-slate-600 text-slate-400 font-bold text-sm text-center hover:bg-slate-800/50 transition-all">Cancel</a>
            <button type="submit" class="flex-1 btn-primary px-8 py-4 rounded-xl font-bold text-sm">{{ 'Save Role' if edit_role else 'Add Role' }}</button>
        </div>
    </form>

    <div class="mt-10 pt-10 border-t border-slate-100">
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Current Roles</h3>
        <div class="flex flex-col gap-2">
            {% for role in roles %}
            <div class="flex items-center justify-between px-4 py-3 bg-slate-800/50 rounded-xl border border-slate-700/50">
                <span class="text-sm font-bold text-slate-300">{{ role.name }}</span>
                {% if not edit_role or edit_role.id != role.id %}
                <div class="flex gap-2">
                    <a href="{{ url_for('team_role_edit', rid=role.id) }}" class="p-2 text-secondary hover:bg-secondary/10 rounded-lg transition-all">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </a>
                    <form action="{{ url_for('admin_manage_team') }}" method="POST" onsubmit="return confirm('Delete role &quot;{{ role.name }}&quot;?')">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <input type="hidden" name="action" value="delete_role">
                        <input type="hidden" name="role_id" value="{{ role.id }}">
                        <button type="submit" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-all">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </form>
                </div>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
