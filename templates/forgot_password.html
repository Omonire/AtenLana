{% extends 'base.html' %}
{% block body %}
<style>
  .login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
  }

  .form-card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border: 1px solid rgba(4, 120, 87, 0.2);
    padding: 2rem 1.5rem md:3rem md:2.5rem;
    border-radius: 24px;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }

  .form-card h3 {
    font-size: 1.75rem;
    color: var(--primary);
    margin-bottom: 0.5rem;
    font-weight: 700;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }

  .form { text-align: left; }
  .form-group { margin-bottom: 1.5rem; }
  .form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .form-group input {
    width: 100%;
    padding: 0.85rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: inherit;
    transition: all 0.3s ease;
  }

  .btn-submit {
    width: 100%;
    padding: 1rem;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    background: var(--gradient-royal);
    color: white;
    box-shadow: 0 4px 15px rgba(26, 26, 26, 0.2);
    transition: all 0.3s ease;
  }

  .btn-submit:hover {
    transform: translateY(-2px);
    filter: brightness(1.1);
  }

  .back-link {
    margin-top: 1.5rem;
    display: block;
    font-size: 0.9rem;
    color: var(--text-muted);
    text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }
</style>

<div class="login-container">
  <div class="card form-card">
    <h3>Reset Password</h3>
    <p class="subtitle">Identify your account to continue recovery.</p>

    <form method="post" class="form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        {% if role == 'student' %}
          <label>University ID or Matric Number</label>
          <input name="identifier" placeholder="Enter University ID or Matric No." required autofocus>
        {% else %}
          <label>Staff Username</label>
          <input name="username" placeholder="Enter username" required autofocus>
        {% endif %}
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit">
          Continue to Security Questions
        </button>
      </div>
    </form>

    <a href="{{ url_for('login', role=role) }}" class="back-link">Return to Login</a>
  </div>
</div>
{% endblock %}
